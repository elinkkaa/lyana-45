  const calc=()=>{const d=Math.max(0,EVENT-Date.now());return{dd:Math.floor(d/864e5),hh:Math.floor(d/36e5)%24,mm:Math.floor(d/6e4)%60,ss:Math.floor(d/1e3)%60,done:d<=0}};
  const [v,setV]=useState(calc);
  useEffect(()=>{const t=setInterval(()=>setV(calc()),1000);return()=>clearInterval(t)},[]);
  return v;
}

/* ─── SCROLL REVEAL ─── */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    if(!window.IntersectionObserver){els.forEach(e=>e.classList.add('in'));return}
    const io=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.1,rootMargin:'0px 0px -6% 0px'});
    els.forEach(e=>io.observe(e));
    return()=>io.disconnect();
  });
}

/* ─── STARS ─── */
function Stars({n=44}){

  return <div className="stars" aria-hidden="true">{stars.current.map((s,i)=><div key={i} className="star" style={{left:s.left+'%',top:s.top+'%',width:s.size,height:s.size,'--d':s.d+'s','--delay':s.delay+'s'}}/>)}</div>;
}

/* ─── RSVP ─── */
function RSVP({c}){
  const [form,setForm]=useState({name:'',att:'',guest:'',diet:'',contact:''});
  const [done,setDone]=useState(false);
  const [err,setErr]=useState(false);
  const set=k=>v=>setForm(f=>({...f,[k]:v}));

  const submit=e=>{
    e.preventDefault();
    if(!form.name.trim()||!form.att||!form.contact.trim()){setErr(true);return}
    setErr(false);saveRSVP({name:form.name,attending:form.att,guest:form.guest,diet:form.diet,contact:form.contact,ts:new Date().toISOString()});setDone(true);
  };

  if(done){
    const yes=form.att==='yes';
    return(
      <Sec id="rsvp" eyebrow={c.eyebrow} narrow>
        <div className="card card-gold reveal" style={{textAlign:'center',maxWidth:520,margin:'0 auto'}}>
          <div style={{fontSize:2.2+'rem',color:'var(--gold-2)',marginBottom:'1rem'}}>{yes?'✦':'☾'}</div>
          <h3 style={{fontFamily:'var(--fd)',fontSize:'clamp(1.4rem,3vw,2rem)',color:'var(--gold-1)',margin:'0 0 1rem'}}>{yes?c.okTitle:c.again}</h3>
          <p style={{color:'var(--ivory)',fontSize:'1.1rem',fontStyle:'italic',lineHeight:1.7,margin:'0 auto 1.5rem',maxWidth:440}}>{yes?c.okBody:c.okDecline}</p>
          <button className="btn btn-outline" onClick={()=>setDone(false)}>{c.again}</button>
        </div>
      </Sec>
    );
  }

  return(
    <Sec id="rsvp" eyebrow={c.eyebrow} title={c.title} narrow>
      <span className="badge badge-outline" style={{marginBottom:'2rem'}}>{c.sub}</span>
      <div className="card card-glass" style={{textAlign:'left'}}>
        <form onSubmit={submit} noValidate style={{display:'flex',flexDirection:'column',gap:'1.5rem'}}>
          {/* name */}
          <div className="field">
            <label className="field-label">{c.fName} <span style={{color:'var(--ruby)'}}>∗</span></label>
            <input className="ds-input" value={form.name} onChange={e=>set('name')(e.target.value)} placeholder={c.fName}/>
          </div>
          {/* attending */}
          <div className="field">
            <label className="field-label">{c.fAtt} <span style={{color:'var(--ruby)'}}>∗</span></label>
            <div className="radio-row">
              {[['yes',c.fYes,'emerald'],['no',c.fNo,'ruby']].map(([val,lbl,tone])=>(
                <div key={val} className={`radio-opt${form.att===val?' selected-'+tone:''}`} onClick={()=>set('att')(val)}>
                  <div className="radio-dot"><div className="radio-dot-inner"/></div>
                  <span className="radio-label">{lbl}</span>
                </div>
              ))}
            </div>
          </div>
          {/* guest */}
          <div className="field">
            <label className="field-label">{c.fGuest}</label>
            <input className="ds-input" value={form.guest} onChange={e=>set('guest')(e.target.value)} placeholder="—"/>
            <span className="field-hint">{c.fGuestH}</span>
          </div>
          {/* diet */}
          <div className="field">
            <label className="field-label">{c.fDiet}</label>
            <textarea className="ds-input" rows={2} value={form.diet} onChange={e=>set('diet')(e.target.value)}/>
            <span className="field-hint">{c.fDietH}</span>
          </div>
          {/* contact */}
          <div className="field">
            <label className="field-label">{c.fContact} <span style={{color:'var(--ruby)'}}>∗</span></label>
            <input className="ds-input" value={form.contact} onChange={e=>set('contact')(e.target.value)} placeholder="+7 … / name@mail"/>
            <span className="field-hint">{c.fContactH}</span>
          </div>
          {err&&<span style={{color:'#C13247',fontSize:'.88rem',fontStyle:'italic'}}>{c.err}</span>}
          <button className="btn btn-gold btn-lg btn-full" type="submit">{c.submit}</button>
        </form>
      </div>
    </Sec>
  );
}

/* ─── FAQ ─── */

/* ─── ADMIN ─── */
function Admin({c,onClose}){
  const [rows,setRows]=useState(loadRSVPs);
  const coming=rows.filter(r=>r.attending==='yes').length;
  const exp=()=>{
    const h=['Имя','Придёт','+1','Питание','Контакт','Дата'];
    const q=s=>'"'+String(s||'').replace(/"/g,'""')+'"';
    const csv='﻿'+[h.join(','),...rows.map(r=>[r.name,r.attending==='yes'?'Да':'Нет',r.guest,r.diet,r.contact,r.ts].map(q).join(','))].join('\n');
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'rsvp-lyana.csv'});a.click();
  };
  const clr=()=>{if(confirm('Очистить?')){localStorage.removeItem(RSVP_KEY);setRows([])}};
  return(
    <div className="overlay" onClick={onClose}>
      <div className="card card-gold" style={{maxWidth:760,width:'100%',margin:'2rem 0'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'1rem',marginBottom:'1rem'}}>
          <h3 style={{margin:0,fontFamily:'var(--fd)',color:'var(--gold-1)',fontSize:'clamp(1.3rem,3vw,1.8rem)'}}>{c.title}</h3>
          <span className="badge badge-emerald">{rows.length} {c.cnt} · {coming} {c.att}</span>
        </div>
        {rows.length===0?<p style={{color:'var(--ivory-d)',fontStyle:'italic'}}>{c.empty}</p>:(
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr>{['Имя','+1','Питание','Контакт'].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{rows.map((r,i)=>(
                <tr key={i} style={{background:r.attending==='yes'?'rgba(26,154,114,.08)':'rgba(154,34,51,.08)'}}>
                  <td><strong style={{color:'var(--gold-1)'}}>{r.name}</strong></td>
                  <td>{r.guest||'—'}</td><td style={{maxWidth:160}}>{r.diet||'—'}</td><td>{r.contact}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
        <div style={{display:'flex',gap:'.75rem',marginTop:'1.5rem',flexWrap:'wrap'}}>
          <button className="btn btn-gold btn-sm" onClick={exp}>{c.exp}</button>
          <button className="btn btn-ghost btn-sm" onClick={clr}>{c.clr}</button>
          <button className="btn btn-outline btn-sm" onClick={onClose} style={{marginLeft:'auto'}}>{c.cls}</button>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const init=(()=>{const p=new URLSearchParams(location.search).get('lang');return(p==='en'||p==='ru')?p:(localStorage.getItem('lyana_lang')||'ru')})();
  const [lang,setLang]=useState(init);
  const [admin,setAdmin]=useState(()=>new URLSearchParams(location.search).has('admin'));
  const c=COPY[lang];

  useEffect(()=>{localStorage.setItem('lyana_lang',lang);document.documentElement.lang=lang},[lang]);
  useReveal();

  const goRSVP=()=>{const el=document.getElementById('rsvp');if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-20,behavior:'smooth'})};

  const toggleLang=()=>setLang(l=>l==='ru'?'en':'ru');

  return(
    <div key={lang}>
      {/* lang toggle */}
      <div style={{position:'fixed',top:'1rem',right:'1rem',zIndex:200}}>
        <div className="lang-toggle">
          <button className={'lang-btn'+(lang==='ru'?' active':'')} onClick={()=>setLang('ru')}>РУС</button>
          <button className={'lang-btn'+(lang==='en'?' active':'')} onClick={()=>setLang('en')}>ENG</button>
        </div>
      </div>

      <Hero c={c} onRSVP={goRSVP}/>
      <Invitation c={c.inv}/>
      <Details c={c.det}/>
      <Dress c={c.dress}/>
      <Night c={c.night}/>
      <RSVP c={c.rsvp}/>
      <FAQ c={c.faq}/>
      <Footer c={c.foot} onAdmin={()=>setAdmin(true)}/>
      {admin&&<Admin c={c.adm} onClose={()=>setAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
