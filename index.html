const RSVP_KEY = 'lyana_rsvp_2026';

/* ── helpers ── */
function loadRSVPs(){try{return JSON.parse(localStorage.getItem(RSVP_KEY)||'[]')}catch(e){return[]}}
function saveRSVP(entry){
  const all=loadRSVPs(); all.push(entry);
  localStorage.setItem(RSVP_KEY,JSON.stringify(all));
  if(window.RSVP_ENDPOINT){
    try{fetch(window.RSVP_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(entry)}).catch(()=>{})}catch(e){}

}

function Details({t}){
  return(
    <Section id="details" eyebrow={t.eyebrow} title={t.title} narrow>
      <Card variant="glass" style={{textAlign:'left'}}>
        <dl className="reveal" style={{display:'grid',gridTemplateColumns:'1fr',gap:0,margin:0}}>
          {t.items.map((it,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',gap:'var(--space-4)',padding:'var(--space-4) 0',borderBottom:i<t.items.length-1?'1px solid var(--border-hairline)':'none',alignItems:'baseline'}}>
              <dt style={{fontFamily:'var(--font-deco)',letterSpacing:'0.16em',textTransform:'uppercase',fontSize:'var(--fs-caption)',color:'var(--gold-300)'}}>{it.k}</dt>
              <dd style={{margin:0,fontFamily:'var(--font-body)',color:'var(--ivory)',fontSize:'var(--fs-body)',textAlign:'right'}}>{it.v}</dd>
            </div>
          ))}
        </dl>
        <div style={{display:'flex',gap:'var(--space-3)',alignItems:'center',marginTop:'var(--space-5)',flexWrap:'wrap'}}>
          <Button variant="outline" as="a" href={t.mapsHref} target="_blank" rel="noopener">{t.maps}</Button>
          <span style={{fontSize:'var(--fs-sm)',color:'var(--text-muted)',fontStyle:'italic',flex:1,minWidth:200}}>
            <strong style={{color:'var(--gold-200)',fontStyle:'normal',fontFamily:'var(--font-deco)',letterSpacing:'0.12em',fontSize:'var(--fs-caption)',textTransform:'uppercase',marginRight:8}}>{t.parkingLabel}</strong>{t.parking}
          </span>
        </div>
      </Card>
    </Section>
  );
}

/* ── Dress Code ── */
function DressCode({t}){
  return(
    <Section id="dress" eyebrow={t.eyebrow} title={t.title} tone="raised">
      <Badge tone="gold" style={{marginBottom:'var(--space-6)'}}>{t.subtitle}</Badge>
      <div className="reveal" style={{display:'flex',gap:'clamp(0.75rem,4vw,2rem)',justifyContent:'center',flexWrap:'wrap',marginBottom:'var(--space-7)'}}>
        {t.palette.map((p,i)=><ColorSwatch key={i} color={p.c} name={p.n}/>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:'var(--space-4)',textAlign:'left'}}>
        {[t.women,t.men].map((g,i)=>(
          <Card key={i} variant="solid" corners={false}>
            <h3 style={{fontSize:'var(--fs-h3)',margin:'0 0 var(--space-2)',color:'var(--gold-100)'}}>{g.h}</h3>
            <p style={{margin:0,color:'var(--ivory-dim)',fontSize:'var(--fs-body)',lineHeight:'var(--lh-body)'}}>{g.t}</p>
          </Card>
        ))}
      </div>
    </Section>

}

/* ── Night Ahead ── */
function NightAhead({t}){
  const icons=['☾','✦','♪','❧'];
  return(
    <Section id="night" eyebrow={t.eyebrow} title={t.title}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'var(--space-4)',textAlign:'left'}}>
        {t.teasers.map((te,i)=>(
          <Card key={i} variant="glass" style={{display:'flex',flexDirection:'column',gap:'var(--space-2)'}}>
            <span aria-hidden="true" style={{fontSize:26,color:'var(--gold-300)',lineHeight:1}}>{icons[i%icons.length]}</span>
            <h3 style={{fontSize:'var(--fs-h3)',margin:0,color:'var(--gold-100)'}}>{te.h}</h3>
            <p style={{margin:0,color:'var(--ivory-dim)',fontSize:'var(--fs-sm)',lineHeight:'var(--lh-body)'}}>{te.t}</p>
          </Card>
        ))}
      </div>
    </Section>
  );
}

/* ── RSVP ── */
function RSVPSection({t}){
  const [form,setForm]=React.useState({name:'',attending:'',guest:'',diet:'',contact:''});
  const [done,setDone]=React.useState(false);
  const [err,setErr]=React.useState(false);
  const set=(k)=>(e)=>setForm(f=>({...f,[k]:e.target?e.target.value:e}));
  const submit=(e)=>{
    e.preventDefault();
    if(!form.name.trim()||!form.attending||!form.contact.trim()){setErr(true);return}
    setErr(false); saveRSVP({...form,ts:new Date().toISOString()}); setDone(true);
  };
  if(done){
    const coming=form.attending==='yes';
    return(
      <Section id="rsvp" eyebrow={t.eyebrow} narrow>
        <Card variant="gold" style={{textAlign:'center'}}>
          <div aria-hidden="true" style={{fontSize:34,color:'var(--gold-200)',marginBottom:'var(--space-3)'}}>{coming?'✦':'☾'}</div>
          <h3 style={{fontFamily:'var(--font-display)',fontSize:'var(--fs-h2)',color:'var(--gold-100)',margin:'0 0 var(--space-4)'}}>{coming?t.successTitle:t.again}</h3>
          <p style={{color:'var(--ivory)',fontSize:'var(--fs-lead)',fontStyle:'italic',lineHeight:'var(--lh-body)',margin:'0 auto var(--space-5)',maxWidth:460}}>{coming?t.successBody:t.successDecline}</p>
          <Button variant="outline" onClick={()=>setDone(false)}>{t.again}</Button>
        </Card>
      </Section>
    );
  }
  return(
    <Section id="rsvp" eyebrow={t.eyebrow} title={t.title} narrow>
      <Badge tone="outline" style={{marginBottom:'var(--space-6)'}}>{t.subtitle}</Badge>
      <Card variant="glass" style={{textAlign:'left'}}>
        <form onSubmit={submit} noValidate style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>
          <Input label={t.name} required value={form.name} onChange={set('name')} placeholder={t.name}/>
          <RadioGroup label={t.attending} name="attending" required value={form.attending} onChange={set('attending')} options={[{value:'yes',label:t.yes,tone:'emerald'},{value:'no',label:t.no,tone:'ruby'}]}/>
          <Input label={t.guest} hint={t.guestHint} value={form.guest} onChange={set('guest')} placeholder="—"/>
          <Textarea label={t.diet} hint={t.dietHint} rows={2} value={form.diet} onChange={set('diet')}/>
          <Input label={t.contact} required value={form.contact} onChange={set('contact')} placeholder="+7 … / name@mail"/>
          {err&&<span style={{color:'var(--ruby-500)',fontSize:'var(--fs-sm)',fontStyle:'italic'}}>{t.required}</span>}
          <Button variant="gold" size="lg" full type="submit">{t.submit}</Button>
        </form>
      </Card>
    </Section>
  );
}

/* ── FAQ ── */
function FAQ({t}){
  const [open,setOpen]=React.useState(0);
  return(
    <Section id="faq" eyebrow={t.eyebrow} title={t.title} narrow tone="raised">
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)',textAlign:'left'}}>
        {t.items.map((it,i)=>{
          const isOpen=open===i;
          return(
            <Card key={i} variant="solid" corners={false} style={{padding:0,overflow:'hidden'}}>
              <button onClick={()=>setOpen(isOpen?-1:i)} aria-expanded={isOpen} style={{width:'100%',textAlign:'left',cursor:'pointer',background:'transparent',border:0,display:'flex',justifyContent:'space-between',alignItems:'center',gap:'var(--space-4)',padding:'var(--space-5)',color:'var(--gold-100)',fontFamily:'var(--font-display)',fontSize:'var(--fs-h3)'}}>
                <span>{it.q}</span>
                <span aria-hidden="true" style={{color:'var(--gold-400)',fontSize:20,transition:'transform var(--dur-base) var(--ease-soft)',transform:isOpen?'rotate(45deg)':'none'}}>+</span>
              </button>
              <div style={{maxHeight:isOpen?240:0,opacity:isOpen?1:0,overflow:'hidden',transition:'max-height var(--dur-slow) var(--ease-soft),opacity var(--dur-base) var(--ease-soft)'}}>
                <p style={{margin:0,padding:'0 var(--space-5) var(--space-5)',color:'var(--ivory-dim)',fontSize:'var(--fs-body)',lineHeight:'var(--lh-body)'}}>{it.a}</p>
              </div>
            </Card>
          );
        })}
      </div>
    </Section>
  );
}

/* ── Footer ── */
function Footer({t,onAdmin}){
  return(
    <footer style={{position:'relative',overflow:'hidden',textAlign:'center',padding:'var(--section-y) var(--gutter) var(--space-7)',background:'var(--grad-night)'}}>
      <Lantern size={40} style={{display:'inline-block',marginBottom:'var(--space-4)'}}/>
      <Divider motif="star" width="120px" style={{margin:'0 auto var(--space-6)'}}/>
      <p style={{fontFamily:'var(--font-display)',fontStyle:'italic',color:'var(--ivory-dim)',fontSize:'var(--fs-lead)',margin:'0 0 var(--space-5)'}}>{t.closing}</p>
      <div className="gold-leaf" style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h2)',marginBottom:'var(--space-2)'}}>{t.host}</div>
      <a href={t.phoneHref} style={{display:'inline-block',fontFamily:'var(--font-deco)',letterSpacing:'0.16em',color:'var(--gold-200)',textDecoration:'none',fontSize:'var(--fs-body)',marginBottom:'var(--space-6)'}}>{t.phone}</a>
      <div>
        <div style={{fontFamily:'var(--font-deco)',fontSize:'var(--fs-caption)',letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:6}}>{t.hashtagLabel}</div>
        <div style={{fontFamily:'var(--font-deco)',letterSpacing:'0.1em',color:'var(--gold-300)',fontSize:'var(--fs-h3)'}}>{t.hashtag}</div>
      </div>
      <button onClick={onAdmin} style={{marginTop:'var(--space-6)',background:'transparent',border:0,color:'var(--ivory-muted)',opacity:.5,cursor:'pointer',fontSize:12,fontFamily:'var(--font-deco)',letterSpacing:'0.16em'}}>✦ host ✦</button>
    </footer>
  );
}

/* ── Admin Panel ── */
function AdminPanel({t,onClose}){
  const [rows,setRows]=React.useState(loadRSVPs);
  const coming=rows.filter(r=>r.attending==='yes').length;
  const exportCSV=()=>{
    const head=['Имя','Придёт','+1','Питание','Контакт','Когда'];
    const esc=(s)=>'"'+String(s||'').replace(/"/g,'""')+'"';
    const body=rows.map(r=>[r.name,r.attending==='yes'?'Да':'Нет',r.guest,r.diet,r.contact,r.ts].map(esc).join(','));
    const csv='﻿'+[head.join(','),...body].join('\n');
    const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a=document.createElement('a');a.href=url;a.download='rsvp-lyana-2026.csv';a.click();URL.revokeObjectURL(url);
  };
  const clear=()=>{if(confirm('Очистить все ответы?')){localStorage.removeItem(RSVP_KEY);setRows([])}};
  return(
    <div role="dialog" aria-modal="true" style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(6,10,26,0.82)',backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'var(--gutter)',overflow:'auto'}} onClick={onClose}>
      <Card variant="gold" style={{maxWidth:760,width:'100%',margin:'var(--space-6) 0',textAlign:'left'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'var(--space-4)',marginBottom:'var(--space-4)',flexWrap:'wrap'}}>
          <h3 style={{margin:0,fontFamily:'var(--font-display)',color:'var(--gold-100)',fontSize:'var(--fs-h2)'}}>{t.title}</h3>
          <Badge tone="emerald">{rows.length} {t.count} · {coming} {t.coming}</Badge>
        </div>
        {rows.length===0?<p style={{color:'var(--ivory-dim)',fontStyle:'italic'}}>{t.empty}</p>:(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'var(--fs-sm)'}}>
              <thead><tr style={{color:'var(--gold-300)',fontFamily:'var(--font-deco)',letterSpacing:'0.1em',textTransform:'uppercase',fontSize:'var(--fs-caption)'}}>
                {['Имя','+1','Питание','Контакт'].map(h=><th key={h} style={{textAlign:'left',padding:'8px 10px',borderBottom:'1px solid var(--border-gold-soft)'}}>{h}</th>)}
              </tr></thead>
              <tbody>{rows.map((r,i)=>(
                <tr key={i} style={{color:'var(--ivory)',borderBottom:'1px solid var(--border-hairline)',background:r.attending==='yes'?'rgba(26,154,114,0.08)':'rgba(193,50,71,0.08)'}}>
                  <td style={{padding:'8px 10px'}}><strong style={{color:'var(--gold-100)'}}>{r.name}</strong></td>
                  <td style={{padding:'8px 10px'}}>{r.guest||'—'}</td>
                  <td style={{padding:'8px 10px',maxWidth:180}}>{r.diet||'—'}</td>
                  <td style={{padding:'8px 10px'}}>{r.contact}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
        <div style={{display:'flex',gap:'var(--space-3)',marginTop:'var(--space-5)',flexWrap:'wrap'}}>
          <Button variant="gold" size="sm" onClick={exportCSV}>{t.export}</Button>
          <Button variant="ghost" size="sm" onClick={clear}>{t.clear}</Button>
          <Button variant="outline" size="sm" onClick={onClose} style={{marginLeft:'auto'}}>{t.close}</Button>
        </div>
      </Card>
    </div>
  );
}

/* ── App ── */
function App(){
  const initial=(()=>{const p=new URLSearchParams(location.search).get('lang');return p==='en'||p==='ru'?p:(localStorage.getItem('lyana_lang')||'ru')})();
  const [lang,setLang]=React.useState(initial);
  const [admin,setAdmin]=React.useState(()=>new URLSearchParams(location.search).get('admin')!==null);
  const c=window.INVITE_COPY[lang];

  React.useEffect(()=>{localStorage.setItem('lyana_lang',lang);document.documentElement.lang=lang},[lang]);

  // Scroll reveal
  React.useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    if(!('IntersectionObserver' in window)){els.forEach(e=>e.classList.add('in'));return}
    const io=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target)}})},{threshold:.12,rootMargin:'0px 0px -8% 0px'});
    els.forEach(e=>io.observe(e));
    return()=>io.disconnect();
  });

  const goRSVP=()=>{const el=document.getElementById('rsvp');if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-20,behavior:'smooth'})};
  const heroT={...c.hero,_cd:c.countdown};

  return(
    <div key={lang}>
      <div style={{position:'fixed',top:'var(--space-4)',right:'var(--space-4)',zIndex:200}}>
        <LangToggle value={lang} onChange={setLang}/>
      </div>
      <Hero t={heroT} target={EVENT_TARGET} onRSVP={goRSVP}/>
      <Invitation t={c.invitation}/>
      <Details t={c.details}/>
      <DressCode t={c.dress}/>
      <NightAhead t={c.night}/>
      <RSVPSection t={c.rsvp}/>
      <FAQ t={c.faq}/>
      <Footer t={c.footer} onAdmin={()=>setAdmin(true)}/>
      {admin&&<AdminPanel t={c.admin} onClose={()=>setAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
